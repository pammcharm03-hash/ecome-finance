{% extends 'base.html' %}
{% block title %}{{ title }} - {{ SCHOOL_NAME }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="fade-in-up">
<div class="page-header"><h1>{{ title }}</h1></div>
<div class="row justify-content-center"><div class="col-lg-5">
    <div class="stat-card"><form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label fw-medium">Year Name *</label><input type="text" name="name" class="form-control" placeholder="e.g. 2026-2027" required></div>
        <div class="mb-3"><label class="form-label fw-medium">Start Date *</label><input type="date" name="start_date" class="form-control" required></div>
        <div class="mb-3"><label class="form-label fw-medium">End Date *</label><input type="date" name="end_date" class="form-control" required></div>
        <div class="mb-3 form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active"><label class="form-check-label" for="active">Set as active year</label></div>
        <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button><a href="{% url 'academics:year_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
    </form></div>
</div></div>
</div>
{% endblock %}
