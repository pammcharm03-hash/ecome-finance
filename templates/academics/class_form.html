{% extends 'base.html' %}
{% block title %}{{ title }} - {{ SCHOOL_NAME }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="fade-in-up">
<div class="page-header"><h1>{{ title }}</h1></div>
<div class="row justify-content-center"><div class="col-lg-6">
    <div class="stat-card"><form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label fw-medium">Class Name *</label><input type="text" name="name" class="form-control" value="{{ class.name|default:'' }}" required></div>
        <div class="mb-3"><label class="form-label fw-medium">Code</label><input type="text" name="code" class="form-control" value="{{ class.code|default:'' }}"></div>
        <div class="mb-3"><label class="form-label fw-medium">Level *</label><select name="level" class="form-select" required>
            <option value="">-- Select Level --</option>
            {% for l in levels %}<option value="{{ l.pk }}" {% if class.level_id == l.pk %}selected{% endif %}>{{ l.name }}</option>{% endfor %}
        </select></div>
        <div class="mb-3"><label class="form-label fw-medium">Branch</label><select name="branch" class="form-select">
            <option value="">-- All Branches --</option>
            {% for b in branches %}<option value="{{ b.pk }}" {% if class.branch_id == b.pk %}selected{% endif %}>{{ b.name }}</option>{% endfor %}
        </select></div>
        <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button><a href="{% url 'academics:class_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
    </form></div>
</div></div>
</div>
{% endblock %}
