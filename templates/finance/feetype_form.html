{% extends 'base.html' %}
{% block title %}{{ title }} - {{ SCHOOL_NAME }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="fade-in-up">
<div class="page-header"><h1>{{ title }}</h1></div>
<div class="row justify-content-center"><div class="col-lg-5">
    <div class="stat-card"><form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label fw-medium">Fee Type Name *</label><input type="text" name="name" class="form-control" value="{{ fee_type.name|default:'' }}" required></div>
        <div class="mb-3"><label class="form-label fw-medium">Description</label><textarea name="description" class="form-control" rows="3">{{ fee_type.description|default:'' }}</textarea></div>
        <div class="d-flex gap-2 flex-wrap"><button type="submit" class="btn btn-primary w-100 w-sm-auto"><i class="bi bi-check-lg me-1"></i>Save</button><a href="{% url 'finance:feetype_list' %}" class="btn btn-outline-secondary w-100 w-sm-auto">Cancel</a></div>
    </form></div>
</div></div>
</div>
{% endblock %}
