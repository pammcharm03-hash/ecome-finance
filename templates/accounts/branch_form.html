{% extends 'base.html' %}
{% block title %}{{ title }} - {{ SCHOOL_NAME }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="fade-in-up">
<div class="page-header"><h1>{{ title }}</h1></div>
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="stat-card">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Branch Name *</label>
                    <input type="text" name="name" class="form-control" value="{{ branch.name|default:'' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Branch Code *</label>
                    <input type="text" name="code" class="form-control" value="{{ branch.code|default:'' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Address</label>
                    <input type="text" name="address" class="form-control" value="{{ branch.address|default:'' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Phone</label>
                    <input type="text" name="phone" class="form-control" value="{{ branch.phone|default:'' }}">
                </div>
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary w-100 w-sm-auto"><i class="bi bi-check-lg me-1"></i>Save</button>
                    <a href="{% url 'accounts:branch_list' %}" class="btn btn-outline-secondary w-100 w-sm-auto">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>
{% endblock %}
